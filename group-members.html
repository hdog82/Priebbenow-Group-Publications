<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Members — Priebbenow Group</title>
<link href="https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e2d4a; --teal-dark: #1a6b5a; --teal-mid: #2a9478;
    --teal-light: #4abf9f; --teal-pale: #e0f5ef; --magenta: #c0296b;
    --gray-100: #f7f8f9; --gray-200: #eaecef; --gray-400: #9ca3af;
    --gray-600: #5a6270; --gray-800: #2d3340; --white: #ffffff;
    --font: 'Aptos', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--white); color: var(--gray-800); line-height: 1.6; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--gray-200); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-size: 0.9rem; font-weight: 500; color: var(--navy); letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-logo span { color: var(--teal-mid); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.85rem; color: var(--gray-600); transition: color 0.2s; }
  .nav-links a:hover { color: var(--teal-dark); }
  .nav-links a.active { color: var(--navy); font-weight: 500; }

  /* HEADER */
  .page-header { background: linear-gradient(160deg, #f0f8f5 0%, #f8f7ff 70%, #fff0f5 100%); border-bottom: 1px solid var(--gray-200); padding: 3.5rem 2rem 2.5rem; }
  .page-header-inner { max-width: 960px; margin: 0 auto; }
  .page-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; color: var(--teal-mid); text-transform: uppercase; margin-bottom: 0.5rem; }
  .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 300; color: var(--navy); line-height: 1.25; }
  .page-header h1 em { font-style: italic; color: var(--navy); font-weight: 300; }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 3rem 2rem 5rem; }

  /* LAB HEAD */
  .labhead-card {
    display: flex; gap: 2.5rem; align-items: center;
    background: var(--navy); border-radius: 8px;
    padding: 2.5rem; margin-bottom: 4rem; color: white;
  }
.labhead-photo {
    width: 220px; border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: rgba(255,255,255,0.3); overflow: hidden;
  }
  .labhead-photo img { width: 220px; height: auto; display: block; border-radius: 6px; }
  .labhead-info { flex: 1; }
  .labhead-name { font-size: 1.4rem; font-weight: 400; margin-bottom: 0.4rem; }
  .labhead-title { font-size: 0.82rem; color: var(--teal-light); margin-bottom: 1rem; font-weight: 300; }
  .labhead-bio { font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.75; font-weight: 300; margin-bottom: 1.25rem; }
  .labhead-contact { font-size: 0.8rem; margin-bottom: 1rem; }
  .labhead-contact span { color: white; font-weight: 400; }
  .labhead-contact a { color: var(--teal-light); text-decoration: none; }
  .labhead-contact a:hover { color: white; }
  .labhead-buttons { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .labhead-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 5px 14px; border-radius: 4px; font-size: 0.78rem; font-weight: 500;
    text-decoration: none; border: 1px solid rgba(255,255,255,0.3);
    color: white; transition: all 0.15s; font-family: var(--font);
    letter-spacing: 0.02em;
  }
  .labhead-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }

  /* ROLE SECTION */
  .role-section { margin-bottom: 3.5rem; }
  .role-heading {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
    color: var(--gray-400); text-transform: uppercase;
    margin-bottom: 1.5rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--gray-200);
  }
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.75rem;
  }

  /* MEMBER CARD */
  .member-card {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; cursor: default;
  }
  .member-photo {
    width: 180px; height: 180px; border-radius: 6px;
    background: var(--gray-100); border: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 0.75rem;
    transition: border-color 0.2s;
    font-size: 2.5rem; color: var(--gray-400);
  }
  .member-photo img { width: 100%; height: 100%; object-fit: cover; }
  .member-card:hover .member-photo { border-color: var(--teal-light); }
  .member-name { font-size: 1rem; font-weight: 500; color: var(--navy); line-height: 1.3; }
  .member-postnominals { font-size: 0.75rem; color: var(--teal-mid); font-style: italic; margin-top: 2px; }
  .member-bio-text { font-size: 0.72rem; color: var(--gray-600); margin-top: 4px; line-height: 1.4; font-weight: 300; }

  /* CAROUSEL */
  .carousel-section { margin: 3rem 0; }
  .carousel-heading { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; color: var(--gray-400); text-transform: uppercase; margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200); }
  .carousel-wrap { position: relative; overflow: hidden; border-radius: 8px; background: var(--gray-100); max-height: 550px; }
  .carousel-track { display: flex; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); height: 100%; }
  .carousel-slide { min-width: 100%; max-height: 550px; object-fit: contain; display: block; flex-shrink: 0; background: var(--gray-100); }
  .carousel-slide-placeholder { min-width: 100%; height: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--gray-200); color: var(--gray-400); font-size: 0.85rem; font-style: italic; }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30,45,74,0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
  .carousel-btn:hover { background: rgba(30,45,74,0.95); }
  .carousel-btn.prev { left: 0.75rem; }
  .carousel-btn.next { right: 0.75rem; }
  .carousel-dots { display: flex; justify-content: center; gap: 0.4rem; margin-top: 0.75rem; }
  .carousel-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-200); border: none; cursor: pointer; padding: 0; transition: background 0.2s; }
  .carousel-dot.active { background: var(--navy); }
  .carousel-caption { font-size: 0.75rem; color: var(--gray-600); text-align: center; margin-top: 0.4rem; font-style: italic; min-height: 1.2em; }
  .alumni-section {
    background: var(--gray-100); border: 1px solid var(--gray-200);
    border-radius: 8px; padding: 2rem 2.5rem; margin-top: 1rem;
    width: 100%;
  }
  .alumni-heading {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
    color: var(--gray-400); text-transform: uppercase;
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
  }
  .alumni-toggle-btn {
    font-family: var(--font); font-size: 0.72rem; font-weight: 500;
    background: var(--navy); color: white; border: none; border-radius: 20px;
    padding: 4px 12px; cursor: pointer; letter-spacing: 0.03em;
    transition: background 0.2s; white-space: nowrap;
  }
.alumni-toggle-btn:hover { background: var(--teal-dark); }
  .alumni-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem 3rem;
  }
  .alumni-col-title { font-size: 0.78rem; font-weight: 500; color: var(--navy); margin-bottom: 0.4rem; }
  .alumni-name { font-size: 0.78rem; color: var(--gray-600); font-weight: 300; line-height: 1.6; }
  .alumni-workplace { color: var(--teal-mid); font-style: italic; font-size: 0.75rem; }

  .section-divider { border: none; border-top: 1px solid var(--gray-200); margin: 3rem 0; }

  /* FOOTER */
  footer { background: var(--gray-100); border-top: 1px solid var(--gray-200); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  footer p { font-size: 0.75rem; color: var(--gray-400); font-weight: 300; margin-bottom: 0.2rem; }
  footer p a { color: var(--teal-mid); text-decoration: none; font-size: 0.75rem; }
  footer a { color: var(--teal-mid); text-decoration: none; font-size: 0.75rem; }

  .loading { text-align: center; padding: 3rem; color: var(--gray-400); font-style: italic; font-size: 0.9rem; }
  .error { text-align: center; padding: 3rem; color: var(--magenta); font-size: 0.9rem; line-height: 1.8; }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; } .nav-links { gap: 1rem; }
    .labhead-card { flex-direction: column; align-items: center; text-align: center; }
    .members-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Priebbenow<span>Group</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="priebbenow-publications.html">Publications</a></li>
    <li><a href="group-members.html" class="active">Group Members</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <h1>Group <em>Members</em></h1>
  </div>
</header>

<main class="main">
  <div id="page-content"><div class="loading">Loading group members…</div></div>
</main>

<footer>
  <div>
    <p>© 2026 Priebbenow Group — <a href="https://www.monash.edu/mips/themes/medicinal-chemistry" target="_blank">Monash Institute of Pharmaceutical Sciences</a></p>
    <p>399 Royal Parade, Parkville VIC 3052, Australia</p>
  </div>
  <a href="priebbenow-publications.html">Publications ↗</a>
</footer>

<script>
  function renderPhoto(photo, large) {
    const size = large ? 130 : 120;
    if (photo && photo.startsWith('data:')) {
      return `<img src="${photo}" alt="photo">`;
    }
    return `<span style="font-size:${large?2.5:1.8}rem;color:${large?'rgba(255,255,255,0.25)':'var(--gray-400)'}">+</span>`;
  }

  function buildLabHead(lh) {
    return `
      <div class="labhead-card">
        <div class="labhead-photo">${renderPhoto(lh.photo, true)}</div>
        <div class="labhead-info">
          <div class="labhead-name">Group Leader: ${lh.name}</div>
          <div class="labhead-title">${lh.title} · ${lh.institution}</div>
          <div class="labhead-bio">${lh.bio}</div>
          ${lh.email ? `<div class="labhead-contact"><span>Contact: </span><a href="mailto:${lh.email}">${lh.email}</a></div>` : ''}
          <div class="labhead-buttons">
            ${lh.linkedin ? `<a class="labhead-btn" href="${lh.linkedin}" target="_blank">🔗 LinkedIn</a>` : ''}
            ${lh.orcid ? `<a class="labhead-btn" href="${lh.orcid}" target="_blank">⬡ ORCID</a>` : ''}
          </div>
        </div>
      </div>`;
  }

  function buildCarousel(images) {
    if (!images || !images.length) return '';
    const slides = images.map((img, i) =>
      img.src
        ? `<img class="carousel-slide" src="${img.src}" alt="${img.caption || ''}" data-caption="${img.caption || ''}">`
        : `<div class="carousel-slide-placeholder">Image placeholder</div>`
    ).join('');
    const dots = images.map((_, i) =>
      `<button class="carousel-dot${i===0?' active':''}" onclick="goToSlide(${i})"></button>`
    ).join('');
    return `
      <div class="carousel-section">
        <div class="carousel-heading">Group Photos</div>
        <div class="carousel-wrap" id="carousel-wrap">
          <div class="carousel-track" id="carousel-track">${slides}</div>
          ${images.length > 1 ? `
            <button class="carousel-btn prev" onclick="prevSlide()">&#8249;</button>
            <button class="carousel-btn next" onclick="nextSlide()">&#8250;</button>` : ''}
        </div>
        ${images.length > 1 ? `<div class="carousel-dots" id="carousel-dots">${dots}</div>` : ''}
        <div class="carousel-caption" id="carousel-caption">${images[0]?.caption || ''}</div>
      </div>`;
  }

  let carouselIndex = 0;
  let carouselTotal = 0;

  function initCarousel(total) {
    carouselTotal = total;
    carouselIndex = 0;
  }

  function goToSlide(n) {
    carouselIndex = n;
    document.getElementById('carousel-track').style.transform = `translateX(-${n * 100}%)`;
    document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === n));
    const slides = document.querySelectorAll('.carousel-slide');
    const caption = slides[n] ? (slides[n].dataset.caption || '') : '';
    document.getElementById('carousel-caption').textContent = caption;
  }

  function nextSlide() { goToSlide((carouselIndex + 1) % carouselTotal); }
  function prevSlide() { goToSlide((carouselIndex - 1 + carouselTotal) % carouselTotal); }

  function buildMembers(roles, members, carousel) {
    const CAROUSEL_AFTER = 'Honours Students';
    return roles.map(role => {
      const group = members.filter(m => m.role === role);
      if (!group.length) return '';
      const cards = group.map(m => `
        <div class="member-card">
          <div class="member-photo">${renderPhoto(m.photo, false)}</div>
          <div class="member-name">${m.name}</div>
          ${m.postnominals ? `<div class="member-postnominals">${m.postnominals}</div>` : ''}
          ${m.bio ? `<div class="member-bio-text">${m.bio.replace(/\n/g, '<br>')}</div>` : ''}
        </div>`).join('');
      const carouselHtml = role === CAROUSEL_AFTER ? buildCarousel(carousel || []) : '';
      return `
        <div class="role-section">
          <div class="role-heading">${role}</div>
          <div class="members-grid">${cards}</div>
        </div>${carouselHtml}`;
    }).join('');
  }

  function buildAlumni(alumni, workplaces) {
    const hasWorkplaces = true;
    const cols = Object.entries(alumni)
      .filter(([, names]) => names.length > 0)
      .map(([title, names]) => {
        const wp = (workplaces && workplaces[title]) || [];
        const rows = names.map((n, i) => {
          const place = wp[i] || '';
          return `<div class="alumni-name">
            <span class="alumni-name-text">${n}</span>
            ${place ? `<span class="alumni-workplace" style="display:none"> → ${place}</span>` : ''}
          </div>`;
        }).join('');
        return `<div><div class="alumni-col-title">${title}</div>${rows}</div>`;
      }).join('');
    return `
      <hr class="section-divider">
      <div class="alumni-section">
        <div class="alumni-heading">
          <span>Alumni</span>
          ${hasWorkplaces ? `<button class="alumni-toggle-btn" id="alumni-toggle-btn" onclick="toggleWorkplaces()">Where we went next</button>` : ''}
        </div>
        <div class="alumni-grid">${cols}</div>
      </div>`;
  }

  let workplacesVisible = false;
  function toggleWorkplaces() {
    workplacesVisible = !workplacesVisible;
    document.querySelectorAll('.alumni-workplace').forEach(el => {
      el.style.display = workplacesVisible ? 'inline' : 'none';
    });
    const btn = document.getElementById('alumni-toggle-btn');
    if (btn) btn.textContent = workplacesVisible ? 'Hide workplaces' : 'Where we went next';
  }

  fetch('members.json')
    .then(r => { if (!r.ok) throw new Error('Could not load members.json'); return r.json(); })
    .then(data => {
      const html =
        buildLabHead(data.labHead) +
        buildMembers(data.roles, data.members, data.carousel) +
        buildAlumni(data.alumni, data.workplaces);
      document.getElementById('page-content').innerHTML = html;
      if (data.carousel && data.carousel.length) initCarousel(data.carousel.length);
    })
    .catch(err => {
      document.getElementById('page-content').innerHTML =
        `<div class="error">Could not load group members.<br>
        Make sure <strong>members.json</strong> is in the same folder as this HTML file.<br>
        <small style="color:#9ca3af">${err.message}</small></div>`;
    });
</script>
</body>
</html>
