<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Members — Priebbenow Group</title>
<link href="https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e2d4a; --teal-dark: #1a6b5a; --teal-mid: #2a9478;
    --teal-light: #4abf9f; --teal-pale: #e0f5ef; --magenta: #c0296b;
    --gray-100: #f7f8f9; --gray-200: #eaecef; --gray-400: #9ca3af;
    --gray-600: #5a6270; --gray-800: #2d3340; --white: #ffffff;
    --font: 'Aptos', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--white); color: var(--gray-800); line-height: 1.6; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--gray-200); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-size: 0.9rem; font-weight: 500; color: var(--navy); letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-logo span { color: var(--teal-mid); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.85rem; color: var(--gray-600); transition: color 0.2s; }
  .nav-links a:hover { color: var(--teal-dark); }
  .nav-links a.active { color: var(--navy); font-weight: 500; }

  /* HEADER */
  .page-header { background: linear-gradient(160deg, #f0f8f5 0%, #f8f7ff 70%, #fff0f5 100%); border-bottom: 1px solid var(--gray-200); padding: 3.5rem 2rem 2.5rem; }
  .page-header-inner { max-width: 960px; margin: 0 auto; }
  .page-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; color: var(--teal-mid); text-transform: uppercase; margin-bottom: 0.5rem; }
  .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 300; color: var(--navy); line-height: 1.25; }
  .page-header h1 em { font-style: italic; color: var(--navy); font-weight: 300; }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 3rem 2rem 5rem; }

  /* LAB HEAD */
  .labhead-card {
    display: flex; gap: 2.5rem; align-items: flex-start;
    background: var(--navy); border-radius: 8px;
    padding: 2.5rem; margin-bottom: 4rem; color: white;
  }
  .labhead-photo {
    width: 130px; height: 130px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: rgba(255,255,255,0.3); overflow: hidden;
  }
  .labhead-photo img { width: 100%; height: 100%; object-fit: cover; }
  .labhead-info { flex: 1; }
  .labhead-name { font-size: 1.4rem; font-weight: 400; margin-bottom: 0.15rem; }
  .labhead-postnominals { font-size: 0.85rem; color: var(--teal-light); font-style: italic; margin-bottom: 0.3rem; }
  .labhead-title { font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-bottom: 1rem; font-weight: 300; }
  .labhead-bio { font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.75; font-weight: 300; margin-bottom: 1rem; }
  .labhead-email { font-size: 0.8rem; color: var(--teal-light); text-decoration: none; }
  .labhead-email:hover { color: white; }

  /* ROLE SECTION */
  .role-section { margin-bottom: 3.5rem; }
  .role-heading {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
    color: var(--gray-400); text-transform: uppercase;
    margin-bottom: 1.5rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--gray-200);
  }
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1.25rem;
  }

  /* MEMBER CARD */
  .member-card {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; cursor: default;
  }
  .member-photo {
    width: 120px; height: 120px; border-radius: 6px;
    background: var(--gray-100); border: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 0.75rem;
    transition: border-color 0.2s;
    font-size: 1.8rem; color: var(--gray-400);
  }
  .member-photo img { width: 100%; height: 100%; object-fit: cover; }
  .member-card:hover .member-photo { border-color: var(--teal-light); }
  .member-name { font-size: 0.85rem; font-weight: 500; color: var(--navy); line-height: 1.3; }
  .member-postnominals { font-size: 0.75rem; color: var(--teal-mid); font-style: italic; margin-top: 2px; }
  .member-bio-text { font-size: 0.72rem; color: var(--gray-600); margin-top: 4px; line-height: 1.4; font-weight: 300; }

  /* ALUMNI */
  .alumni-section {
    background: var(--gray-100); border: 1px solid var(--gray-200);
    border-radius: 8px; padding: 2rem 2.5rem; margin-top: 1rem;
  }
  .alumni-heading {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
    color: var(--gray-400); text-transform: uppercase;
    margin-bottom: 1.5rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--gray-200);
  }
  .alumni-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem 2rem;
  }
  .alumni-col-title { font-size: 0.78rem; font-weight: 500; color: var(--navy); margin-bottom: 0.4rem; }
  .alumni-name { font-size: 0.78rem; color: var(--gray-600); font-weight: 300; line-height: 1.6; }

  .section-divider { border: none; border-top: 1px solid var(--gray-200); margin: 3rem 0; }

  /* FOOTER */
  footer { background: var(--gray-100); border-top: 1px solid var(--gray-200); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  footer p { font-size: 0.75rem; color: var(--gray-400); font-weight: 300; margin-bottom: 0.2rem; }
  footer p a { color: var(--teal-mid); text-decoration: none; font-size: 0.75rem; }
  footer a { color: var(--teal-mid); text-decoration: none; font-size: 0.75rem; }

  .loading { text-align: center; padding: 3rem; color: var(--gray-400); font-style: italic; font-size: 0.9rem; }
  .error { text-align: center; padding: 3rem; color: var(--magenta); font-size: 0.9rem; line-height: 1.8; }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; } .nav-links { gap: 1rem; }
    .labhead-card { flex-direction: column; align-items: center; text-align: center; }
    .members-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Priebbenow<span>Group</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="priebbenow-publications.html">Publications</a></li>
    <li><a href="#" class="active">Group Members</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <h1>Group <em>Members</em></h1>
  </div>
</header>

<main class="main">
  <div id="page-content"><div class="loading">Loading group members…</div></div>
</main>

<footer>
  <div>
    <p>© 2026 Priebbenow Group — <a href="https://www.monash.edu/mips/themes/medicinal-chemistry" target="_blank">Monash Institute of Pharmaceutical Sciences</a></p>
    <p>399 Royal Parade, Parkville VIC 3052, Australia</p>
  </div>
  <a href="priebbenow-publications.html">Publications ↗</a>
</footer>

<script>
  function renderPhoto(photo, large) {
    const size = large ? 130 : 120;
    if (photo && photo.startsWith('data:')) {
      return `<img src="${photo}" alt="photo">`;
    }
    return `<span style="font-size:${large?2.5:1.8}rem;color:${large?'rgba(255,255,255,0.25)':'var(--gray-400)'}">+</span>`;
  }

  function buildLabHead(lh) {
    return `
      <div class="labhead-card">
        <div class="labhead-photo">${renderPhoto(lh.photo, true)}</div>
        <div class="labhead-info">
          <div class="labhead-name">Group Leader: ${lh.name}</div>
          <div class="labhead-title">${lh.title} · ${lh.institution}</div>
          <div class="labhead-bio">${lh.bio}</div>
          ${lh.email ? `<a class="labhead-email" href="mailto:${lh.email}">Contact: ${lh.email}</a>` : ''}
        </div>
      </div>`;
  }

  function buildMembers(roles, members) {
    return roles.map(role => {
      const group = members.filter(m => m.role === role);
      if (!group.length) return '';
      const cards = group.map(m => `
        <div class="member-card">
          <div class="member-photo">${renderPhoto(m.photo, false)}</div>
          <div class="member-name">${m.name}</div>
          ${m.postnominals ? `<div class="member-postnominals">${m.postnominals}</div>` : ''}
          ${m.bio ? `<div class="member-bio-text">${m.bio}</div>` : ''}
        </div>`).join('');
      return `
        <div class="role-section">
          <div class="role-heading">${role}</div>
          <div class="members-grid">${cards}</div>
        </div>`;
    }).join('');
  }

  function buildAlumni(alumni) {
    const cols = Object.entries(alumni)
      .filter(([, names]) => names.length > 0)
      .map(([title, names]) => `
        <div>
          <div class="alumni-col-title">${title}</div>
          ${names.map(n => `<div class="alumni-name">${n}</div>`).join('')}
        </div>`).join('');
    return `
      <hr class="section-divider">
      <div class="alumni-section">
        <div class="alumni-heading">Alumni</div>
        <div class="alumni-grid">${cols}</div>
      </div>`;
  }

  fetch('members.json')
    .then(r => { if (!r.ok) throw new Error('Could not load members.json'); return r.json(); })
    .then(data => {
      const html =
        buildLabHead(data.labHead) +
        buildMembers(data.roles, data.members) +
        buildAlumni(data.alumni);
      document.getElementById('page-content').innerHTML = html;
    })
    .catch(err => {
      document.getElementById('page-content').innerHTML =
        `<div class="error">Could not load group members.<br>
        Make sure <strong>members.json</strong> is in the same folder as this HTML file.<br>
        <small style="color:#9ca3af">${err.message}</small></div>`;
    });
</script>
</body>
</html>
