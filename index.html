<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priebbenow Group — Monash Institute of Pharmaceutical Sciences</title>
<link href="https://fonts.googleapis.com/css2?family=Aptos:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e2d4a;
    --teal-dark: #1a6b5a;
    --teal-mid: #2a9478;
    --teal-light: #4abf9f;
    --teal-pale: #e0f5ef;
    --magenta: #c0296b;
    --gray-100: #f7f8f9;
    --gray-200: #eaecef;
    --gray-400: #9ca3af;
    --gray-600: #5a6270;
    --gray-800: #2d3340;
    --white: #ffffff;
    --font: 'Aptos', 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--gray-800);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- HERO ---- */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem 3rem;
    background: linear-gradient(160deg, #eef2f7 0%, #f8f7ff 50%, #fdf0f5 100%);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(42,148,120,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(192,41,107,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 3rem;
    animation: fadeDown 0.7s ease both;
  }
  .logo {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 500;
    color: var(--navy);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1;
  }
  .logo span { color: var(--teal-mid); }

  /* NAV BUTTONS */
  .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 340px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .nav-btn {
    display: block;
    padding: 1rem 1.75rem;
    border-radius: 6px;
    text-decoration: none;
    border: none;
    background: var(--teal-mid);
    color: white;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-align: center;
    transition: background 0.4s ease, color 0.4s ease;
    cursor: pointer;
  }

  .nav-btn:hover {
    background: #000000;
    color: #ffffff;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--gray-200);
    background: var(--white);
  }
  footer p {
    font-size: 0.72rem;
    color: var(--gray-400);
    font-weight: 300;
  }
  footer a { color: var(--teal-mid); text-decoration: none; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .nav-buttons { grid-template-columns: 1fr; max-width: 340px; }
  }
</style>
</head>
<body>

<section class="hero">

  <div class="logo-wrap">
    <div class="logo">Priebbenow<span>Group</span></div>
  </div>

  <nav class="nav-buttons">
    <a class="nav-btn" href="research.html">Research</a>
    <a class="nav-btn" href="priebbenow-publications.html">Publications</a>
    <a class="nav-btn" href="group-members.html">Group Members</a>
    <a class="nav-btn" href="contact.html">Contact</a>
  </nav>

</section>

<footer>
  <p>© 2026 Priebbenow Group · <a href="https://www.monash.edu/mips/themes/medicinal-chemistry" target="_blank">Monash Institute of Pharmaceutical Sciences</a> · 399 Royal Parade, Parkville VIC 3052</p>
</footer>

</body>
</html>
